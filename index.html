<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jmoshi — Reminiscence Companion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #f5f3ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 36px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    color: #1B2A4A;
    margin-bottom: 4px;
  }
  .tagline {
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }

  /* Status indicator */
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ccc;
    transition: background .3s;
  }
  .dot.listening { background: #1D9E75; animation: pulse 1.5s infinite; }
  .dot.speaking  { background: #7F77DD; animation: pulse .8s infinite; }
  .dot.thinking  { background: #BA7517; animation: pulse 1s infinite; }
  .dot.error     { background: #E24B4A; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { font-size: 14px; color: #555; }

  /* Transcript */
  .transcript {
    background: #f9f8f6;
    border-radius: 12px;
    padding: 16px;
    min-height: 120px;
    max-height: 240px;
    overflow-y: auto;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.7;
  }
  .msg { margin-bottom: 10px; }
  .msg.user   .bubble { background: #E6F1FB; color: #0C447C; margin-left: 24px; }
  .msg.bot    .bubble { background: #E1F5EE; color: #0F4030; margin-right: 24px; }
  .bubble {
    border-radius: 12px;
    padding: 8px 12px;
    display: inline-block;
    max-width: 100%;
  }
  .speaker {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #aaa;
    margin-bottom: 2px;
    padding-left: 4px;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-start { background: #1B2A4A; color: white; }
  .btn-end   { background: #f0f0f0; color: #555; }

  /* Cost note */
  .cost-note {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
    line-height: 1.5;
  }
  .cost-note strong { color: #1D9E75; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Jmoshi</div>
  <div class="tagline">Your reminiscence companion — powered by Pipecat + Qwen3 + Kokoro</div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="status">Ready to connect</span>
  </div>

  <div class="transcript" id="transcript">
    <div style="color:#bbb;font-size:13px">Your conversation will appear here...</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-start" id="btn-start" onclick="startSession()">
      Start session
    </button>
    <button class="btn btn-end" id="btn-end" onclick="endSession()" disabled>
      End session
    </button>
  </div>

  <div class="cost-note">
    <strong>~$0.001 per minute</strong> · Deepgram ASR + Qwen3 on Groq + Kokoro TTS (CPU)
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const WS_URL   = 'ws://localhost:8765/session/demo_user';
const USER_ID  = 'demo_user';

// ── State ────────────────────────────────────────────────────────────────────
let ws        = null;
let mediaStream  = null;
let audioCtx     = null;
let processor    = null;
let audioQueue   = [];
let isPlaying    = false;

// ── UI helpers ────────────────────────────────────────────────────────────────
function setStatus(text, state) {
  document.getElementById('status').textContent = text;
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state ? ' ' + state : '');
}

function addMessage(role, text) {
  const t = document.getElementById('transcript');
  // Clear placeholder
  if (t.querySelector('div[style]')) t.innerHTML = '';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="speaker">${role === 'user' ? 'You' : 'Jmoshi'}</div>
    <div class="bubble">${text}</div>`;
  t.appendChild(div);
  t.scrollTop = t.scrollHeight;
}

// ── Session control ───────────────────────────────────────────────────────────
async function startSession() {
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-end').disabled   = false;
  setStatus('Connecting...', null);

  try {
    // 1. Get microphone
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

    // 2. Connect WebSocket to Jmoshi bot
    ws = new WebSocket(WS_URL);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('Listening...', 'listening');
      startMicStream();
    };

    ws.onmessage = (event) => {
      if (event.data instanceof ArrayBuffer) {
        // Audio frames from Kokoro TTS — queue and play
        audioQueue.push(event.data);
        if (!isPlaying) playNextAudio();
      }
    };

    ws.onclose = () => {
      setStatus('Session ended', null);
      cleanup();
    };

    ws.onerror = (e) => {
      setStatus('Connection error — is the bot server running?', 'error');
      console.error('WebSocket error:', e);
    };

  } catch (err) {
    setStatus(`Error: ${err.message}`, 'error');
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-end').disabled   = true;
  }
}

function endSession() {
  if (ws) ws.close();
  cleanup();
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-end').disabled   = true;
}

// ── Mic streaming — sends raw PCM to Pipecat ─────────────────────────────────
function startMicStream() {
  audioCtx  = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  const src = audioCtx.createMediaStreamSource(mediaStream);

  // ScriptProcessor buffers 4096 samples (~256ms at 16kHz)
  // In production, use AudioWorkletProcessor for lower latency
  processor = audioCtx.createScriptProcessor(4096, 1, 1);
  processor.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const float32 = e.inputBuffer.getChannelData(0);
    // Convert Float32 PCM → Int16 PCM (what Pipecat expects)
    const int16 = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
    }
    ws.send(int16.buffer);
  };

  src.connect(processor);
  processor.connect(audioCtx.destination);
}

// ── Audio playback — plays Kokoro TTS output ─────────────────────────────────
async function playNextAudio() {
  if (audioQueue.length === 0) {
    isPlaying = false;
    setStatus('Listening...', 'listening');
    return;
  }

  isPlaying = true;
  setStatus('Jmoshi is speaking...', 'speaking');

  const buffer = audioQueue.shift();

  try {
    if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 24000 });
    const decoded = await audioCtx.decodeAudioData(buffer.slice(0));
    const source  = audioCtx.createBufferSource();
    source.buffer = decoded;
    source.connect(audioCtx.destination);
    source.onended = playNextAudio;
    source.start(0);
  } catch (e) {
    console.error('Audio playback error:', e);
    playNextAudio(); // skip broken frame
  }
}

// ── Cleanup ───────────────────────────────────────────────────────────────────
function cleanup() {
  if (processor)    { processor.disconnect(); processor = null; }
  if (audioCtx)     { audioCtx.close();       audioCtx  = null; }
  if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  ws         = null;
  audioQueue = [];
  isPlaying  = false;
}
</script>

</body>
</html>
